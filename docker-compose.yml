services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/
      DATABASE_NAME: scannerdb
      COLLECTION_NAME: sslchecker
      DEMO_MODE: "true"
      ALLOW_PUBLIC_SCAN: "false"
    depends_on:
      - mongo

volumes:
  mongo-data:
